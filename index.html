<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#05070d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>FLevelingP</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #05070d;
            --main-panel-bg: linear-gradient(180deg, #0f172a 0%, #020617 100%);
            --lower-panel-bg: #020617;
            --text-main: #cbd5f5;
            --text-accent: #38bdf8;
            --text-purple: #a855f7;
            --border-color: rgba(56, 189, 248, 0.4);
            --glow: 0 0 15px rgba(56, 189, 248, 0.3);
            --bar-hp: linear-gradient(90deg, #38bdf8, #818cf8);
            --font-game: 'Press Start 2P', cursive;
            --danger: #f43f5e;
            --success: #22d3ee;
        }

        body {
            font-family: var(--font-game);
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .system-status {
            color: var(--text-accent);
            margin-bottom: 20px;
            font-size: 7px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 10px var(--text-accent); }
            100% { opacity: 0.5; }
        }

        .app-wrapper { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 15px; }

        .panel { 
            border: 1px solid var(--border-color); 
            padding: 18px; 
            box-shadow: var(--glow);
            background: var(--main-panel-bg);
        }

        .panel-top { clip-path: polygon(0 0, 100% 0, 100% 92%, 92% 100%, 0 100%); }
        .panel-bottom { clip-path: polygon(8% 0, 100% 0, 100% 100%, 0 100%, 0 8%); margin-top: -5px; background: var(--lower-panel-bg); }

        .streak-counter {
            border: 1px solid var(--text-accent);
            padding: 10px;
            text-align: center;
            margin-bottom: 15px;
            color: var(--text-accent);
            background: rgba(56, 189, 248, 0.05);
        }

        .divider { height: 1px; background: var(--border-color); margin: 12px 0; }

        .bar-container {
            background: #000;
            height: 8px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            overflow: hidden;
            margin-bottom: 10px;
        }

        .bar-fill { height: 100%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px var(--text-accent); }

        .stat-item { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .stat-val { color: var(--text-accent); text-shadow: 0 0 5px var(--text-accent); }

        .ch-lvl-counter { text-align: right; font-size: 12px; margin-top: 15px; color: var(--text-purple); text-shadow: 0 0 8px var(--text-purple); }

        .actions-section { width: 100%; max-width: 360px; margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 15px; }

        .actions-grid { display: grid; gap: 8px; }

        button {
            background: rgba(15, 23, 42, 0.8);
            color: #94a3b8;
            border: 1px solid #1e293b;
            padding: 14px;
            font-family: var(--font-game);
            font-size: 7px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:active { background: rgba(56, 189, 248, 0.2); color: var(--text-accent); }

        .btn-finish { background: rgba(56, 189, 248, 0.1); color: var(--success); border-color: var(--success); margin-top: 15px; text-align: center; width: 100%; padding: 16px; }
        .btn-finish:hover { background: var(--success); color: black; }

        .btn-fail { background: rgba(244, 63, 94, 0.05); color: var(--danger); border-color: var(--danger); margin-top: 8px; text-align: center; width: 100%; opacity: 0.6; padding: 12px; }

        .notification {
            position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
            background: #000; color: var(--text-accent);
            padding: 15px 30px; border: 1px solid var(--text-accent);
            box-shadow: 0 0 20px var(--text-accent);
            display: none; z-index: 999; text-align: center; width: 80%;
        }

        .io-section { width: 100%; max-width: 360px; margin-top: 20px; opacity: 0.4; font-size: 6px; padding-bottom: 40px; }
        textarea { width: 100%; background: #000; color: #38bdf8; border: 1px solid #1e293b; font-family: monospace; font-size: 7px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="notif" class="notification">[NOTIFICACIÓN DEL SISTEMA]</div>

<div class="system-status">[ SISTEMA INICIALIZADO: ESTADO ACTIVO ]</div>

<div class="app-wrapper">
    <div class="panel panel-top">
        <div style="font-size: 11px; margin-bottom: 15px; color: var(--text-accent);">FLEVELING: MONARCH</div>
        <div class="streak-counter">RACHA: <span id="streak-val">0</span> DÍAS | x<span id="bonus-val">1.0</span></div>
        <div style="font-size:6px; margin-bottom:4px; color: var(--text-accent);">HP [ESTABILIDAD MENTAL]</div>
        <div class="bar-container"><div class="bar-fill" style="background: var(--bar-hp); width: 100%;"></div></div>
        <div class="divider"></div>
        <div id="stats-container"></div>
        <div class="divider"></div>
        <div class="ch-lvl-counter">RANGO: <span id="lvl-general">0</span></div>
    </div>

    <div class="panel panel-bottom">
        <div id="xp-container"></div>
        <div class="divider"></div>
        <div style="text-align: center; font-size: 8px; color: #64748b;">
            EXP <span id="xp-gen-current" style="color:white">0</span> / <span id="xp-gen-max">100</span>
        </div>
    </div>
</div>

<div class="actions-section">
    <div class="actions-grid">
        <button onclick="addXP({'STR': 15, 'END': 10})">[QUEST] EJERCICIO (+STR/END)</button>
        <button onclick="addXP({'INT': 20, 'FOC': 10})">[QUEST] ESTUDIO (+INT/FOC)</button>
        <button onclick="addXP({'DEX': 15, 'WILL': 5})">[QUEST] MANIPULATION SKILL (+DEX/WILL)</button>
        <button onclick="addXP({'FOC': 25})">[SKILL] MODO ENFOQUE (+FOC)</button>
        <button onclick="addXP({'END': 15})">[DAILY] CAMINAR 10KM (+END)</button>
        <button onclick="addXP({'END': 10, 'WILL': 5})">[DAILY] COMER BIEN (+END)</button>
        <button onclick="addXP({'WILL': 30})">[QUEST] TODAS LAS TAREAS HECHAS (+WILL)</button>
    </div>
    
    <button class="btn-finish" onclick="finishDay()">[!] FINALIZAR DÍA (RACHA +1)</button>
    <button class="btn-fail" onclick="failDay()">[X] MISIÓN FALLIDA / RESET RACHA</button>
    
    <button onclick="resetProgress()" style="width:100%; border:none; background:none; color:#1e293b; margin-top:20px; font-size:5px;">TERMINATE SYSTEM (WIPE DATA)</button>
</div>

<div class="io-section">
    <div style="display:flex; gap:5px;">
        <button onclick="exportData()" style="flex:1; text-align:center; font-size:6px;">GUARDAR CÓDIGO</button>
        <button onclick="importData()" style="flex:1; text-align:center; font-size:6px;">CARGAR CÓDIGO</button>
    </div>
    <textarea id="io-box" rows="1" placeholder="CÓDIGO DE SISTEMA"></textarea>
</div>

<script>
    let userData = {
        general: { lvl: 0, xp: 0 },
        streak: 0,
        stats: {
            STR: { lvl: 0, xp: 0 }, INT: { lvl: 0, xp: 0 }, DEX: { lvl: 0, xp: 0 },
            WILL: { lvl: 0, xp: 0 }, END: { lvl: 0, xp: 0 }, FOC: { lvl: 0, xp: 0 }
        }
    };

    const statsList = ['STR', 'INT', 'DEX', 'WILL', 'END', 'FOC'];
    const getStatMaxXP = (lvl) => Math.floor(30 * Math.pow(1.2, lvl));
    const getGenMaxXP = (lvl) => Math.floor(100 * Math.pow(1.15, lvl));

    function updateUI() {
        document.getElementById('lvl-general').innerText = userData.general.lvl;
        document.getElementById('xp-gen-current').innerText = userData.general.xp;
        document.getElementById('xp-gen-max').innerText = getGenMaxXP(userData.general.lvl);
        document.getElementById('streak-val').innerText = userData.streak;
        document.getElementById('bonus-val').innerText = (1 + (userData.streak * 0.1)).toFixed(1);

        const sCont = document.getElementById('stats-container');
        const xCont = document.getElementById('xp-container');
        sCont.innerHTML = ''; xCont.innerHTML = '';

        statsList.forEach(s => {
            const stat = userData.stats[s];
            const max = getStatMaxXP(stat.lvl);
            sCont.innerHTML += `<div class="stat-item"><span class="stat-name">${s}</span><span class="stat-val">LVL. ${stat.lvl}</span></div>`;
            xCont.innerHTML += `
                <div style="font-size:6px; margin-bottom:3px; color:#64748b;">${s} ANALYSIS</div>
                <div class="bar-container"><div class="bar-fill" style="background:var(--text-accent); width:${(stat.xp/max)*100}%"></div></div>
            `;
        });
    }

    function addXP(gains) {
        let bonusMultiplier = 1 + (userData.streak * 0.1);
        let totalGained = 0;
        for (let statKey in gains) {
            let amount = Math.floor(gains[statKey] * bonusMultiplier);
            totalGained += amount;
            let s = userData.stats[statKey];
            s.xp += amount;
            while (s.xp >= getStatMaxXP(s.lvl)) { s.xp -= getStatMaxXP(s.lvl); s.lvl++; showNotify(`[SISTEMA] ${statKey} AUMENTADO`); }
        }
        userData.general.xp += totalGained;
        while (userData.general.xp >= getGenMaxXP(userData.general.lvl)) { userData.general.xp -= getGenMaxXP(userData.general.lvl); userData.general.lvl++; showNotify(`[SISTEMA] SUBIDA DE RANGO`); }
        saveGame(); updateUI();
    }

    function finishDay() { userData.streak++; showNotify(`[SISTEMA] MISIÓN DIARIA COMPLETADA / RACHA: ${userData.streak}`); saveGame(); updateUI(); }
    function failDay() { if (confirm("ALERTA DE PENALIZACIÓN: ¿RESETEAR RACHA?")) { userData.streak = 0; userData.general.xp = Math.max(0, userData.general.xp - 50); saveGame(); updateUI(); showNotify("[SISTEMA] RACHA REINICIADA"); } }
    function resetProgress() { if (confirm("¿TERMINAR TODOS LOS DATOS?")) { localStorage.removeItem('fleveling_save'); location.reload(); } }
    function showNotify(msg) { const n = document.getElementById('notif'); n.innerText = msg; n.style.display = 'block'; setTimeout(() => n.style.display = 'none', 3000); }
    function saveGame() { localStorage.setItem('fleveling_save', btoa(JSON.stringify(userData))); }
    function exportData() { document.getElementById('io-box').value = btoa(JSON.stringify(userData)); }
    function importData() { try { userData = JSON.parse(atob(document.getElementById('io-box').value)); saveGame(); updateUI(); showNotify("[SISTEMA] RESTAURADO"); } catch(e) { showNotify("[SISTEMA] CORRUPTO"); } }

    window.onload = () => {
        const save = localStorage.getItem('fleveling_save');
        if (save) userData = JSON.parse(atob(save));
        updateUI();
    }
</script>

</body>
</html>
